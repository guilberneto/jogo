<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Jogo</title>
</head>

<body id="corpo">
    <canvas id="canvas"></canvas>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js" defer></script>

    <script>

        // sons do jogo
        let somTiro = new Audio("./sons/tiro01.mp3");
        let somDano = new Audio("./sons/dano.mp3");
        let somMorte = new Audio("./sons/morte.mp3");

        somTiro.volume = 0.5;
        somDano.volume = 0.6;
        somMorte.volume = 0.7;


        let nomeJogador = "";
        let jogoIniciado = false;
        let jogadoresOnline = 0;

        // iniciando o socket io
        let socket = null;

        // Coletando nome do jogador 
        function formularioNome() {

            let corpo = document.getElementById("corpo");

            let containerForm = document.createElement("form");
            containerForm.id = "formNome";

            let span = document.createElement("span");
            span.textContent = "Nome do Jogador";

            let inputNome = document.createElement("input");
            inputNome.type = "text";
            inputNome.placeholder = "Digite seu nome";

            let botao = document.createElement("button");
            botao.type = "submit";
            botao.textContent = "Entrar";

            containerForm.appendChild(span);

            containerForm.appendChild(inputNome);
            containerForm.appendChild(botao);

            corpo.appendChild(containerForm);

            containerForm.addEventListener("submit", (evento) => {

                evento.preventDefault();

                const nome = inputNome.value.trim();

                if (!nome) {
                    alert("Digite um nome!");
                    return;
                }

                nomeJogador = nome;

                socket = io();

                iniciarEventosSocket();

                containerForm.remove();

                jogoIniciado = true;

                atualizar();

            });
        }

        function iniciarEventosSocket() {

            socket.on("connect", () => {

                console.log("Conectado:", socket.id);

                socket.emit("entrar_jogo", {
                    nome: nomeJogador
                });

            });

            socket.on("estado_jogo", (estado) => {

                jogadores = estado.jogadores || {};
                projeteis = estado.projeteis || [];

                jogadoresOnline = estado.online || 0;

            });

            socket.on("recebeu_dano", () => {

                somDano.currentTime = 0;

                somDano.play();
            });


            socket.on("morreu", () => {

                somMorte.currentTime = 0;

                somMorte.play();

            });

        }



        // canvas

        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // inputs talvez mudarei conforme o tempo

        const teclas = {};

        const mouse = {
            x: 0,
            y: 0
        };

        // estado do jogo

        let jogadores = {};
        let projeteis = [];

        // capturar eventos do teclado e mouse

        document.addEventListener("keydown", (event) => {

            teclas[event.key.toLowerCase()] = true;

        });

        document.addEventListener("keyup", (event) => {

            teclas[event.key.toLowerCase()] = false;

        });


        canvas.addEventListener("mousemove", (event) => {

            mouse.x = event.clientX;
            mouse.y = event.clientY;

        });

        // funcionalidade de tiro ao lado do cliente 

        canvas.addEventListener("mousedown", (event) => {

            /*
            // botão esquerdo
            if (event.button === 0) {

                socket.emit("atirar");

            }

            */

            if (event.button === 0 && socket && socket.connected) {

                somTiro.currentTime = 0;

                somTiro.play();

                socket.emit("atirar");
            }

        });

        // loop principal

        function atualizar() {


            // pega o player local
            const meuJogador = jogadores[socket.id];

            let angulo = 0;


            // calcular ângulo
            if (meuJogador) {
                angulo = Math.atan2(

                    mouse.y - (meuJogador.y + meuJogador.tamanho / 2),

                    mouse.x - (meuJogador.x + meuJogador.tamanho / 2)

                );
            }

            // enviando os dados do jogo ao servidor
            socket.emit("dados_jogo", {
                teclas_pressionadas: teclas,
                angulo: angulo,
            });


            // limpar tela
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // desenhar os jogadores na tela
            for (let id in jogadores) {

                const jogador = jogadores[id];

                // salva contexto
                ctx.save();

                // move origem
                ctx.translate(

                    jogador.x + jogador.tamanho / 2,
                    jogador.y + jogador.tamanho / 2

                );

                // rotação
                ctx.rotate(jogador.angulo || 0);

                // cor do player
                ctx.fillStyle = jogador.cor || "red";

                // corpo
                ctx.fillRect(

                    -jogador.tamanho / 2,
                    -jogador.tamanho / 2,

                    jogador.tamanho,
                    jogador.tamanho

                );

                // arma
                ctx.fillStyle = "black";

                ctx.fillRect(

                    0,
                    -5,

                    jogador.tamanho / 2,
                    10

                );

                // restaura contexto
                ctx.restore();

                // barra de vida do jogador, nome , mortes etc..
                ctx.fillStyle = "red";

                ctx.fillRect(

                    jogador.x,
                    jogador.y - 15,

                    jogador.tamanho,
                    8

                );

                ctx.fillStyle = "lime";

                ctx.fillRect(

                    jogador.x,
                    jogador.y - 15,

                    jogador.tamanho * ((jogador.vida || 100) / 100),
                    8

                );

                ctx.fillStyle = "white";
                ctx.font = "12px Arial";
                ctx.textAlign = "center";

                ctx.fillText(
                    jogador.nome || "",
                    jogador.x + jogador.tamanho / 2,
                    jogador.y - 25
                );

                ctx.fillStyle = "yellow";
                ctx.font = "10px Arial";

                ctx.fillText(
                    `K:${jogador.kills || 0} D:${jogador.deaths || 0}`,
                    jogador.x + jogador.tamanho / 2,
                    jogador.y - 40
                );
            }

            // desenhando os projeteis as (balas)
            projeteis.forEach((p) => {

                ctx.beginPath();

                ctx.arc(

                    p.x,
                    p.y,
                    p.raio,

                    0,
                    Math.PI * 2

                );

                ctx.fillStyle = "yellow";

                ctx.fill();

                ctx.closePath();

            });

            /*
            // Mostrar placar e jogadores online
            const xCentro = canvas.width / 2;
            const yCentro = canvas.width / 2;

            ctx.fillStyle = "white";
            ctx.font = "16px Arial";
            ctx.textAlign = "left";

            let linha = 50;

            ctx.fillText(
                `Online: ${jogadoresOnline}`,
                xCentro,
                yCentro
            );
            ctx.fillText("PLACAR", 20, linha);

            linha += 25;
            */

            ctx.fillStyle = "#FFD700";       // Cor destacada (Ex: Amarelo Ouro)
            ctx.font = "bold 18px Arial";    // Negrito e levemente maior para destacar
            ctx.textAlign = "center";        // Garante a centralização horizontal

            const xCentro = canvas.width / 2;
            const yTopo = 30;                // Define uma distância fixa do topo da tela

            ctx.fillText(
                `Online: ${jogadoresOnline}`,
                xCentro,
                yTopo
            );

            // 2. Configuração para o "Placar" (Lado Esquerdo)
            ctx.fillStyle = "white";         // Retorna para a cor padrão do placar
            ctx.font = "16px Arial";
            ctx.textAlign = "left";          // Alinha o texto à esquerda

            let linha = 50;                  // Começa abaixo do topo

            ctx.fillText("PLACAR", 20, linha);

            // Próximas linhas do placar (ex: nomes dos jogadores)
            linha += 25;
            // ctx.fillText("Jogador 1: 10", 20, linha); // Exemplo de uso contínuo

            for (const id in jogadores) {

                const jogador = jogadores[id];

                ctx.fillText(
                    `${jogador.nome} | Matou: ${jogador.kills || 0} Foi Morto: ${jogador.deaths || 0}`,
                    20,
                    linha
                );

                linha += 25;
            }
            // Fps loop 
            requestAnimationFrame(atualizar);
        }

        // iniciar jogo
        //atualizar();
        formularioNome();
        // Quando a tela for redimensionada no caso do lado do cliente
        window.addEventListener("resize", () => {

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

        });
    </script>

</body>

</html>
